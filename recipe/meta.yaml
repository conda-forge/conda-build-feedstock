{% set version = "26.3.0" %}
{% set build = 1 %}

package:
  name: conda-build
  version: {{ version }}

source:
  url: https://github.com/conda/conda-build/releases/download/{{ version }}/conda-build-{{ version }}.tar.gz
  sha256: 678670e53d8b7b9a8679996a503e3da44c479a1653939d5ebf72b94bf56f848b

build:
  number: {{ build+100 if python_min == "3.10" else build }}
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - conda-build = conda_build.cli.main_build:execute
    - conda-convert = conda_build.cli.main_convert:execute
    - conda-debug = conda_build.cli.main_debug:execute
    - conda-develop = conda_build.cli.main_develop:execute
    - conda-inspect = conda_build.cli.main_inspect:execute
    - conda-metapackage = conda_build.cli.main_metapackage:execute
    - conda-render = conda_build.cli.main_render:execute
    - conda-skeleton = conda_build.cli.main_skeleton:execute

requirements:
  build:
    - python {{ python_min }}.*            # [build_platform != target_platform]
    - cross-python_{{ target_platform }}   # [build_platform != target_platform]
  host:
    - python {{ python_min }}.*
    - pip
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
  run:
    - beautifulsoup4
    - cctools            # [osx]
    - chardet
    - conda >=25.11.0
    - conda-index >=0.4.0
    - conda-package-handling >=2.2.0
    - evalidate >=2,<3.0a
    - filelock
    - frozendict >=2.4.2
    - jinja2
    - jsonschema >=4.19
    - m2-patch >=2.6     # [win]
    - menuinst >=2
    - packaging
    - patch >=2.6        # [not win]
    # cap due to https://github.com/conda/conda-build/issues/4881; https://github.com/NixOS/patchelf/issues/492
    - patchelf <0.18     # [linux]
    - pkginfo
    - psutil
    - py-lief
{% if python_min == "3.10" %}
    - python >=3.10,<3.11
    - tomli
{% else %}
    - python >={{ python_min }}
{% endif %}
    - python-libarchive-c
    - pyyaml
    - rattler-build
    - requests
    - ripgrep
    - tqdm
    - __linux       # [linux]
    - __osx         # [osx]
    - __win         # [win]
  run_constrained:
    - conda-libmamba-solver >=25.11.0
    - conda-verify >=3.1.0

test:
  imports:
    - conda_build
    - conda_build.jinja_context

  requires:
    - pip
    - python {{ python_min }}.*

  commands:
    - python -m pip check
    # subcommands
    - conda --help
    - conda build --help
    - conda convert --help
    - conda develop --help
    - conda metapackage --help
    - conda render --help
    - conda skeleton --help
    - conda debug --help
    # entrypoints
    - conda-build --help
    - conda-convert --help
    - conda-develop --help
    - conda-inspect --help
    - conda-inspect linkages --help  # [unix]
    - conda-inspect objects --help  # [osx]
    - conda-metapackage --help
    - conda-render --help
    - conda-skeleton --help
    - conda-debug --help
  downstreams:
    - conda-smithy  # [python_min != "3.10" and not osx]

about:
  home: https://github.com/conda/conda-build
  summary: tools for building conda packages
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  description: |
    Conda-build contains commands and tools to allow you to build your own
    packages for conda.
  doc_url: https://docs.conda.io/projects/conda-build/en/latest/
  dev_url: https://github.com/conda/conda-build

extra:
  recipe-maintainers:
    - chenghlee
    - isuruf
    - jakirkham
    - mingwandroid
    - msarahan
    - mwcraig
    - ocefpaf
    - patricksnape
    - pelson
    - scopatz
    - stuertz
    - CJ-Wright
    - xhochy
    - cjmartian
    - dbast
    - jezdez
    - kenodegard
    - beeankha
    - beckermr
